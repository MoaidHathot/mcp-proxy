# MCP Proxy Documentation - Jekyll Configuration
# This site is built with GitHub Pages using Jekyll

title: MCP Proxy
description: A proxy server for the Model Context Protocol (MCP) that aggregates multiple MCP servers into a single endpoint.
baseurl: "/mcp-proxy"
url: "https://moaidhathot.github.io"

# Theme
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# GitHub repository info
github:
  repository_url: https://github.com/MoaidHathot/mcp-proxy
  repository_nwo: MoaidHathot/mcp-proxy

# Build settings
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Navigation
navigation:
  - title: Home
    url: /
  - title: Getting Started
    url: /getting-started/
  - title: Configuration
    url: /configuration/
  - title: Features
    url: /features/
  - title: Advanced
    url: /advanced/
  - title: Integrations
    url: /integrations/
  - title: API Reference
    url: /api/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
